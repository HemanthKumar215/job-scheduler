name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Define connection strings once at workflow level — all steps inherit these.
  # Using actual env vars (not .env file) avoids all dotenv path-resolution issues:
  # Prisma CLI, PrismaClient in tsx scripts, and test runners all read process.env directly.
  DATABASE_URL: postgresql://postgres:password@localhost:5432/job_scheduler?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: super-secret-key-change-it-in-production
  NODE_ENV: test
  PORT: 3001

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: job_scheduler
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Database Client
        run: npm run build -w prisma

      - name: Run Database Migrations
        # 'migrate deploy' applies committed migration files — no interactive prompts.
        # 'migrate dev' is interactive and fails in CI (no TTY). Never use it here.
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed Database
        # Uses 'npm run seed -w prisma' which runs 'tsx seed.ts' from the prisma/ dir.
        # seed.ts has 'import dotenv/config' but DATABASE_URL is also set at workflow level
        # so PrismaClient gets it from process.env regardless of .env file discovery.
        run: npm run seed -w prisma

      - name: Run Standard Tests
        run: npm run test

      - name: Run Concurrency & Failover Proof Tests
        run: npm run test:proofs
